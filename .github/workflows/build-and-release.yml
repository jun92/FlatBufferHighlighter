name: Build and Release VSIX

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore FlatBufferHighlighter.csproj

    - name: Build VSIX
      run: msbuild FlatBufferHighlighter.csproj /p:Configuration=Release /p:DeployExtension=false /p:CreateVsixContainer=true

    - name: Upload VSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FlatBufferHighlighter-VSIX
        path: bin/Release/vs17.0/FlatBufferHighlighter.vsix

    - name: Upload VSIX to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/vs17.0/FlatBufferHighlighter.vsix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

